<div class="layout-container" fxLayout="column" fxFlexFill>
  <!-- <header class="top-nav" fxLayout="row" fxLayoutAlign="space-between center"> -->
  <app-top-nav [isTransparent]="isHome"></app-top-nav>
  <!-- </header> -->

  <!-- 🧭 Main Content -->
  <main class="main-content" fxFlex>
    <router-outlet></router-outlet>
  </main>

  <!-- 🧩 Bottom Navbar -->
  <footer class="bottom-nav" fxLayout="row" fxLayoutAlign="space-around center">
    <a routerLink="/home" routerLinkActive="active" #rlaHome="routerLinkActive" fxLayout="column" fxLayoutAlign="center center">
      <img [src]="rlaHome.isActive ? 'home.svg' : 'home copy.svg'" alt="Home" class="nav-icon" />
      <span>Home</span>
    </a>
    <a routerLink="/team" routerLinkActive="active" #rlaTeam="routerLinkActive" fxLayout="column" fxLayoutAlign="center center">
      <img [src]="rlaTeam.isActive ? 'team.svg' : 'team copy.svg'" alt="Team" class="nav-icon" />
      <span>Team</span>
    </a>
    <a routerLink="/task" routerLinkActive="active" #rlaTask="routerLinkActive" fxLayout="column" fxLayoutAlign="center center">
      <img [src]="rlaTask.isActive ? 'position.svg' : 'position copy.svg'" alt="Task" class="nav-icon" />
      <span>Task</span>
    </a>
    <a routerLink="/rewards" routerLinkActive="active" #rlaRewards="routerLinkActive" fxLayout="column" fxLayoutAlign="center center">
      <img [src]="rlaRewards.isActive ? 'giftbox.svg' : 'giftbox copy.svg'" alt="Rewards" class="nav-icon" />
      <span>Rewards</span>
    </a>
    <a routerLink="/profile" routerLinkActive="active" #rlaProfile="routerLinkActive" fxLayout="column" fxLayoutAlign="center center">
      <img [src]="rlaProfile.isActive ? 'profile.svg' : 'profile copy.svg'" alt="Profile" class="nav-icon" />
      <span>Profile</span>
    </a>
  </footer>

</div>
