<div class="page-container">
  <div class="banner">
    <app-top-nav></app-top-nav>
    <div class="banner-body">
      <div class="back-btn-wrap" (click)="goBack()">
        <img src="/leftarraow.svg" alt="back" style="filter: brightness(0) invert(1);" />
      </div>
      <h2>{{ 'Set Transaction Password' | translate }}</h2>
      <p>{{ 'Set a new password. Ensure it differs from previous ones for security.' | translate }}</p>
    </div>
  </div>

  <div class="form-container">
    <form [formGroup]="form">
      <div class="input-group">
        <label>{{ 'Set Transaction Password' | translate }}</label>
        <input 
          type="password" 
          formControlName="password" 
          placeholder="{{ 'Enter the Transaction Password' | translate }}" 
        />
        <div class="error-msg" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          {{ 'Password must be at least 6 characters' | translate }}
        </div>
      </div>
      
      <div class="input-group">
        <label>{{ 'Confirm Transaction Password' | translate }}</label>
        <input 
          type="password" 
          formControlName="confirmPassword" 
          placeholder="{{ 'Confirm Transaction Password' | translate }}" 
        />
        <div class="error-msg" *ngIf="form.errors?.['mismatch'] && form.get('confirmPassword')?.touched">
          {{ 'Passwords do not match.' | translate }}
        </div>
      </div>
    </form>
  </div>

  <div class="bottom-buttons">
    <button class="primary-btn" (click)="updatePassword()" [disabled]="form.invalid || isLoading">
      <span *ngIf="!isLoading">{{ 'Update password' | translate }}</span>
      <span *ngIf="isLoading">{{ 'Updating...' | translate }}</span>
    </button>
    <button class="secondary-btn" (click)="goBack()">{{ 'Cancel' | translate }}</button>
  </div>
</div>
