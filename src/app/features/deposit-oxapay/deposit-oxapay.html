<div class="layout-container">
  <app-top-nav [isWhite]="true"></app-top-nav>

  <div class="content-body">
    <div class="header-nav">
      <button class="back-btn-dark" (click)="goBack()">
        <img src="/leftarraow.svg" style="filter: brightness(0) invert(0);" alt="back" />
      </button>
    </div>

    <div class="page-title-box">
      <h2 class="main-title">{{ 'Recharge' | translate }}</h2>
      <p class="sub-title">{{ 'Minimum Deposit 30 USDT/USDC' | translate }}</p>
    </div>

    <div class="timer-container">
      <span class="timer-text">{{ countdownText | translate }}</span>
    </div>

    <div class="qr-container">
      <img class="qr-image" [src]="data?.qr_code" />
    </div>

    <div class="amount-container">
      <p class="amount-label">{{ 'Amount Payable' | translate }}</p>
      <h3 class="amount-value">{{ data?.amount }} USDT</h3>
    </div>

    <div class="address-container">
      <p class="address-label">{{ 'Copy the Deposit address to transfer the amount' | translate }}</p>
      <div class="address-box">
        <span class="address-text">{{ data?.address }}</span>
        <button class="copy-btn" (click)="copyToClipboard(data?.address)">
          <img src="/copy.svg" alt="copy" />
        </button>
      </div>
    </div>

    <div class="cancel-box">
      <button class="cancel-btn" (click)="cancel()">{{ 'Cancel' | translate }}</button>
    </div>
  </div>
</div>
